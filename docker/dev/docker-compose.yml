services:
  nginx:
    build:
      context: ../../
      dockerfile: ./docker/dev/Dockerfile.nginx
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      # mongo:
      #   condition: service_healthy
    networks:
      - app-network
    mem_limit: 256m
    cpus: 0.25

  frontend:
    build:
      context: ../../
      dockerfile: ./docker/dev/Dockerfile.frontend
    container_name: frontend
    env_file:
      - ../../env/development.env
    volumes:
      - ../../frontend:/frontend
      - frontend-node-modules:/frontend/node_modules
    expose:
      - "5173"
    networks:
      - app-network
    mem_limit: 1g
    cpus: 0.5

  backend:
    build:
      context: ../../
      dockerfile: ./docker/dev/Dockerfile.backend
    container_name: backend
    env_file:
      - ../../env/development.env
    volumes:
      - ../../backend:/backend
      - backend-node-modules:/backend/node_modules
    expose:
      - "5000"
    networks:
      - app-network
    mem_limit: 2g
    cpus: 0.5

  postgres:
    image: postgres:17.9-alpine3.23
    container_name: postgresql
    env_file:
      - ../../env/development.env
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5432:5432"
    networks:
      - app-network
    mem_limit: 2g
    cpus: 1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d freightboard"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  pgadmin:
    image: dpage/pgadmin4:9.13.0
    container_name: pgadmin
    env_file:
      - ../../env/development.env
    restart: always
    ports:
      - "5050:80"
    networks:
      - app-network
    depends_on:
      - postgres

  # mongo:
  #   image: mongo:8.0.19
  #   container_name: mongodb
  #   env_file:
  #     - ../../env/development.env
  #   restart: unless-stopped
