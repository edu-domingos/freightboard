  #     MONGO_INITDB_ROOT_USERNAME: admin
  #     MONGO_INITDB_ROOT_PASSWORD: pass
  #     MONGO_INITDB_DATABASE: freightboard
  #   volumes:
  #     - mongo-data:/data/db
  #   expose:
  #     - "27017"
  #   ports:
  #     - "27017:27017"
  #   networks:
  #     - app-network
  #   mem_limit: 2g
  #   cpus: 1
  #   healthcheck:
  #     test:
  #       [
  #         "CMD-SHELL",
  #         'mongosh -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval ''db.adminCommand("ping")'' || exit 1',
  #       ]
  #     interval: 10s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 20s

volumes:
  #mongo-data:
  postgres-data:
  frontend-node-modules:
  backend-node-modules:

networks:
  app-network:
    driver: bridge
