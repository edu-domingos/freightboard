# nginx.conf (unificado)

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # =====================
  # RATE LIMIT
  # =====================
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

  # =====================
  # UPSTREAMS
  # =====================
  upstream frontend {
    server frontend:5173;  # Substitua pelo nome correto do serviço
  }

  upstream backend {
    server backend:5000;  # Substitua pelo nome do serviço correto
  }

  # =====================
  # REDIRECIONAMENTO HTTP → HTTPS
  # =====================
  server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
  }

  # =====================
  # FRONTEND → BACKEND
  # =====================
  server {
    listen 443 ssl;
    server_name _;
    server_tokens off;

    # =====================
    # CONFIG SSL
    # =====================
    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling off;
    ssl_stapling_verify off;

    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 15s;
    send_timeout 60s;

    # =====================
    # SECURITY HEADERS
    # =====================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # =====================
    # FRONTEND → PROXY
    # =====================
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;

      # WebSocket / HMR
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;

      # =====================
      # Content Security Policy (Frontend)
      # =====================
      add_header Content-Security-Policy "
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: blob:;
          font-src 'self' data:;
          connect-src 'self' http://localhost:5173 ws://localhost:5173;
          worker-src blob:;
          frame-ancestors 'self';
          base-uri 'self';
          form-action 'self';
      " always;
    }

    # =====================
    # API → BACKEND
    # =====================
    location /api/ {
      # Limite de requisições
      limit_req zone=api_limit burst=50 delay=2;

      proxy_pass http://backend/;  # a barra final remove o /api do path
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      proxy_request_buffering off;

      # =====================
      # CORS HEADERS
      # =====================
      add_header Access-Control-Allow-Origin "http://localhost:5173" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
    }
  }
}
