<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="200"
   height="200"
   viewBox="0 0 100 100"
   version="1.1"
   id="svg48"
   sodipodi:docname="5ed82cec759da6497831daceb9d423da.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview50"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0" />
  <!-- O fundo agora é transparente (sem o rect preto) -->
  <defs
     id="defs22">
    <!-- Gradiente para o corpo principal (azul vibrante) -->
    <linearGradient
       id="truckBodyGradient"
       x1="0%"
       y1="0%"
       x2="0%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#4DA6FF;stop-opacity:1"
         id="stop2" />
      <stop
         offset="100%"
         style="stop-color:#2171C1;stop-opacity:1"
         id="stop4" />
    </linearGradient>
    <!-- Gradiente para a cabine (azul mais escuro) -->
    <linearGradient
       id="cabinGradient"
       x1="0%"
       y1="0%"
       x2="0%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#2171C1;stop-opacity:1"
         id="stop7" />
      <stop
         offset="100%"
         style="stop-color:#0D3B66;stop-opacity:1"
         id="stop9" />
    </linearGradient>
    <!-- Brilho da janela -->
    <linearGradient
       id="windowShine"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#FFFFFF;stop-opacity:0.9"
         id="stop12" />
      <stop
         offset="100%"
         style="stop-color:#4DA6FF;stop-opacity:0.3"
         id="stop14" />
    </linearGradient>
    <!-- Filtro de brilho suave para as luzes -->
    <filter
       id="glow"
       x="-0.128125"
       y="-0.45555556"
       width="1.25625"
       height="1.9111111">
      <feGaussianBlur
         stdDeviation="1.5"
         result="blur"
         id="feGaussianBlur17" />
      <feComposite
         in="SourceGraphic"
         in2="blur"
         operator="over"
         id="feComposite19" />
    </filter>
  </defs>
  <!-- Linhas de movimento (Speed Lines) à esquerda -->
  <g
     stroke="#4DA6FF"
     stroke-width="2"
     stroke-linecap="round"
     opacity="0.8"
     id="g30">
    <line
       x1="28"
       y1="46"
       x2="36"
       y2="46"
       id="line24" />
    <line
       x1="25"
       y1="51"
       x2="38"
       y2="51"
       stroke-width="2.5"
       id="line26" />
    <line
       x1="30"
       y1="56"
       x2="37"
       y2="56"
       id="line28" />
  </g>
  <!-- Corpo Principal (Baú) -->
  <path
     d="M40 38 Q40 36 42 36 L65 36 Q67 36 67 38 L67 56 L40 56 Z"
     fill="url(#truckBodyGradient)"
     id="path32" />
  <!-- Cabine -->
  <path
     d="M67 40 L76 40 Q80 40 81 44 L82 56 L67 56 Z"
     fill="url(#cabinGradient)"
     id="path34" />
  <!-- Janela da Cabine -->
  <path
     d="M71 43 L76 43 Q78 43 78 45 L78 51 L71 51 Z"
     fill="url(#windowShine)"
     id="path36" />
  <!-- Rodas com brilho azul -->
  <g
     filter="url(#glow)"
     id="g46">
    <circle
       cx="50"
       cy="59"
       r="4.5"
       fill="#2171C1"
       stroke="#4DA6FF"
       stroke-width="1"
       id="circle38" />
    <circle
       cx="73"
       cy="59"
       r="4.5"
       fill="#2171C1"
       stroke="#4DA6FF"
       stroke-width="1"
       id="circle40" />
    <!-- Centros das rodas -->
    <circle
       cx="50"
       cy="59"
       r="1.5"
       fill="#FFFFFF"
       opacity="0.8"
       id="circle42" />
    <circle
       cx="73"
       cy="59"
       r="1.5"
       fill="#FFFFFF"
       opacity="0.8"
       id="circle44" />
  </g>
</svg>
